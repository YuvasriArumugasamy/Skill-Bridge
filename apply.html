<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="apply.css">
    <title>Professional Application | Skill Bridge</title>
</head>
<body>
    <div class="apply__page__wrapper">
        <div class="apply__container">
            <div class="apply__info">
                <div class="apply__logo">
                    <a href="index.html" class="logo">Skill<span>Bridge</span></a>
                </div>
                <h2>Start Your <br><span>Tech Career</span> Here.</h2>
                <ul class="benefit__list">
                    <li><i class="ri-checkbox-circle-fill"></i> Industry Recognized Certificate</li>
                    <li><i class="ri-checkbox-circle-fill"></i> Direct Mentorship from Experts</li>
                    <li><i class="ri-checkbox-circle-fill"></i> Hands-on Live Projects</li>
                </ul>
                <div class="info__footer">
                    <p>Need help? <a href="#">Contact Support</a></p>
                </div>
            </div>

            
        <div class="apply__form__box">
    <form action="#" class="actual__form">
        <h3>Personal Details</h3>
        <div class="input__row">
            <div class="input__group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>
            <div class="input__group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email address" required>
            </div>
        </div>

        <div class="input__row">
            <div class="input__group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter 10-digit mobile number" required>
            </div>
            <div class="input__group">
                <label>Select Your Internship Domain</label>
                <select required>
                    <option value="" disabled selected>Choose a specialized track</option>
                    <optgroup label="Web & Mobile Development">
                        <option value="frontend-react">Frontend Developer (React.js / Next.js)</option>
                        <option value="backend-node">Backend Developer (Node.js / Express)</option>
                        <option value="fullstack-mern">Full Stack Developer (MERN Stack)</option>
                        <option value="mobile-flutter">Mobile App Developer (Flutter / Dart)</option>
                    </optgroup>
                    <optgroup label="Zoho & Business Automation">
                        <option value="zoho-creator">Zoho Creator Developer (Deluge Scripting)</option>
                        <option value="zoho-crm">Zoho CRM Implementation Specialist</option>
                        <option value="zoho-analytics">Zoho Analytics & BI Specialist</option>
                    </optgroup>
                    <optgroup label="Data, AI & Machine Learning">
                        <option value="ai-engineer">AI Engineer (Generative AI / LLMs)</option>
                        <option value="ml-engineer">Machine Learning Engineer</option>
                        <option value="data-scientist">Data Scientist</option>
                    </optgroup>
                    <optgroup label="Design & Operations">
                        <option value="uiux-design">UI/UX Designer (Figma / Adobe XD)</option>
                        <option value="cloud-aws">Cloud Engineer (AWS)</option>
                        <option value="cyber-security">Cyber Security Analyst</option>
                    </optgroup>
                </select>
            </div>
        </div>

        <h3>Professional Links</h3>
        <div class="input__group">
            <label>GitHub or Portfolio URL</label>
            <input type="url" placeholder="Paste your profile or project link">
        </div>

        <div class="file__upload__area">
            <i class="ri-upload-cloud-2-line"></i>
            <p>Click to upload Resume (PDF only)</p>
            <input type="file" id="resume" accept=".pdf" hidden required>
            <label for="resume" class="upload__btn">Browse Files</label>
        </div>

        <div class="action__btns">
            <button type="submit" class="submit__btn">Submit Application</button>
            <a href="index.html" class="cancel__btn">Cancel</a>
        </div>
    </form>
</div>
        
        
        
        </div>
    </div>
</body>
</html>
