<!DOCTYPE html>

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #5651d7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .container {
            background: white; padding: 30px; border-radius: 15px;
            width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .quiz-screen { display: none; text-align: left; }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-option {
            background: white; border: 1px solid #ddd; padding: 12px;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-option.selected { background: #e0e0ff; border-color: #5651d7; color: #5651d7; font-weight: bold; }

        #subCategorySection {
            display: none; margin-top: 15px; text-align: left;
            background: #f9f9fb; padding: 15px; border-radius: 8px; border: 1px dashed #5651d7;
        }

        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; margin-top: 10px; outline: none; }
        .number-options { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }

        .timer-box {
            background: #f1f2f6; padding: 8px 15px; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 8px;
            color: #ff4757; font-weight: bold; font-size: 16px;
            border: 2px solid #ff4757; margin-bottom: 15px;
        }

        .answer-btn { 
            background: white; color: #333; border: 1px solid #ddd; 
            text-align: left; margin-top: 10px; width: 100%; 
            padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .answer-btn.selected { background: #e0e0ff; border-color: #5651d7; color: #5651d7; font-weight: bold; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .prev-btn { background: #eee; color: #555; }
        .prev-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .next-btn { background: #5651d7; color: white; }

        #startQuizBtn { background: #5651d7; color: white; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="configBox">
    <h2>Quiz Configuration</h2>
    <p><strong>Select Category</strong></p>
    <div class="grid-options" id="categoryBox">
        <button class="btn-option" onclick="handleCategory(this, 'Programming')">Programming</button>
        <button class="btn-option" onclick="handleCategory(this, 'General Knowledge')">General Knowledge</button>
        <button class="btn-option" onclick="handleCategory(this, 'Mathematics')">Mathematics</button>
        <button class="btn-option" onclick="handleCategory(this, 'Non-Coding')">Non-Coding</button>
    </div>

    <div id="subCategorySection">
        <label for="courseSelect"><strong id="subLabel">Select Specialization:</strong></label>
        <select id="courseSelect"></select>
    </div>

    <p><strong>No. of Questions</strong></p>
    <div class="number-options" id="countBox">
        <button class="btn-option" onclick="selectNum(this)">5</button>
        <button class="btn-option selected" onclick="selectNum(this)">10</button>
        <button class="btn-option" onclick="selectNum(this)">15</button>
        <button class="btn-option" onclick="selectNum(this)">20</button>
    </div>

    <button id="startQuizBtn" onclick="startQuiz()">Start Quiz</button>
</div>

<div class="container quiz-screen" id="quizScreen">
    <div style="text-align: center;">
        <div class="timer-box"><i class="fa-solid fa-clock"></i> <span id="timerDisplay">00:00</span></div>
    </div>
    
    <p id="progressText" style="color: #888; font-size: 14px; margin-bottom: 5px;">Question 1</p>
    <h3 id="questionText" style="margin-top: 0;">Loading Question...</h3>
    <div id="answerOptions"></div>

    <div class="nav-buttons">
        <button class="nav-btn prev-btn" id="prevBtn" onclick="prevQuestion()">

        </button>
        <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()">

        </button>
    </div>
</div>

        { q: "What is 'Inclusive Education'?", options: ["Education for all (incl. disabilities)", "Private education", "Separate schools"], correct: 0 },
        { q: "What is 'Lesson Plan'?", options: ["Outline of a teacher's lesson", "A list of students", "A school map"], correct: 0 },
        { q: "What is 'Montessori'?", options: ["A child-centered educational approach", "A subject name", "A type of exam"], correct: 0 },
        { q: "What is 'Mentoring'?", options: ["Guiding and supporting someone", "Giving a test", "Checking attendance"], correct: 0 },
        { q: "What is 'Soft Skills Training'?", options: ["Teaching communication/teamwork", "Teaching coding", "Math training"], correct: 0 },
        { q: "What is 'Higher Education'?", options: ["College/University level", "Primary school", "Kindergarten"], correct: 0 },
        { q: "What is 'Literacy'?", options: ["Ability to read and write", "Being smart", "Learning science"], correct: 0 },
        { q: "What is 'Homeschooling'?", options: ["Educating children at home", "School in a house", "Private tutor"], correct: 0 },
        { q: "What is 'Syllabus'?", options: ["Outline of topics for a course", "A textbook", "Teacher's salary"], correct: 0 },
        { q: "What is 'Bloom's Taxonomy'?", options: ["Hierarchy of learning objectives", "A type of plant", "A school name"], correct: 0 },
        { q: "What is 'Active Learning'?", options: ["Engaging students in the process", "Listening to lectures only", "Watching TV"], correct: 0 },
        { q: "What is 'Distance Education'?", options: ["Learning from a different location", "Traveling to school", "Field trips"], correct: 0 },
        { q: "What is 'Vocational Training'?", options: ["Skills for a specific trade/job", "Learning history", "Singing"], correct: 0 },
        { q: "What is 'Tutoring'?", options: ["Private/individual instruction", "Public lecture", "Playing games"], correct: 0 },
        { q: "What is 'Lifelong Learning'?", options: ["Ongoing learning throughout life", "School for kids only", "University degree"], correct: 0 }
    ]
}
    };
let currentQuestions = [];
    let userAnswers = [];
    let currentIndex = 0;
    let totalTime;
    let timerInterval;

    function handleCategory(element, category) {
        document.querySelectorAll('#categoryBox .btn-option').forEach(b => b.classList.remove('selected'));
        element.classList.add('selected');
        const subSection = document.getElementById("subCategorySection");
        subSection.style.display = "block";
        document.getElementById("subLabel").innerText = "Select " + category + " Topic:";
        
        const courseSelect = document.getElementById("courseSelect");
        courseSelect.innerHTML = "";
        
        // Dynamic topics loading
        if(quizData[category]) {
            quizData[category].forEach(topic => {
                let option = document.createElement("option");
                option.value = topic;
                option.text = topic;
                courseSelect.appendChild(option);
            });
        }
    }

    function selectNum(element) {
        document.querySelectorAll('#countBox .btn-option').forEach(b => b.classList.remove('selected'));
        element.classList.add('selected');
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        const categoryBtn = document.querySelector('#categoryBox .selected');
        if(!categoryBtn) { alert("Please select a category!"); return; }

        const categoryName = categoryBtn.innerText;
        const topicName = document.getElementById("courseSelect").value;
        const count = parseInt(document.querySelector('#countBox .selected').innerText);
        
        // Logic to get questions based on Topic
        let pool = [];
        if (questionBank[categoryName] && questionBank[categoryName][topicName]) {
            pool = [...questionBank[categoryName][topicName]];
        } else {
            // Fallback: If specific topic questions are missing, show a message
            alert("Questions for this topic are being updated. Try 'Web Development' or 'Data Science'!");
            return;
        }

        shuffle(pool);
        currentQuestions = pool.slice(0, count);
        userAnswers = new Array(currentQuestions.length).fill(null);

        if(currentQuestions.length === 0) {
            alert("No questions found for this selection!");
            return;
        }

        const timeMap = { 5: 60, 10: 120, 15: 180, 20: 300 };
        totalTime = timeMap[count] || 120;

        document.getElementById("configBox").style.display = "none";
        document.getElementById("quizScreen").style.display = "block";
        
        startTimer();
        loadQuestion();
    }
    function startTimer() {
        timerInterval = setInterval(() => {
            if (totalTime <= 0) {
                clearInterval(timerInterval);
                alert("Time's up!");
                showResult();
                return;
            }
            totalTime--;
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;
            document.getElementById("timerDisplay").innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function loadQuestion() {
        const data = currentQuestions[currentIndex];
        document.getElementById("progressText").innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
        document.getElementById("questionText").innerText = data.q;
        
        const optionsDiv = document.getElementById("answerOptions");
        optionsDiv.innerHTML = "";
        
        data.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "answer-btn";
            if (userAnswers[currentIndex] === i) btn.classList.add("selected");
            btn.innerText = opt;
            btn.onclick = () => {
                userAnswers[currentIndex] = i;
                loadQuestion();
            };
            optionsDiv.appendChild(btn);
        });

        document.getElementById("prevBtn").disabled = (currentIndex === 0);
        document.getElementById("nextBtn").innerHTML = (currentIndex === currentQuestions.length - 1) 
            ? 'Finish Quiz <i class="fa-solid fa-check"></i>' 
            : 'Next <i class="fa-solid fa-arrow-right"></i>';
    }

    function nextQuestion() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        let score = 0;
        userAnswers.forEach((ans, i) => {
            if (ans === currentQuestions[i].correct) score++;
        });

        // Determine message based on score
        let statusMessage = "";
        let statusColor = "";
        let icon = "";

        if (score === currentQuestions.length) {
            statusMessage = "Perfect Score! You are an Expert! 🌟";
            statusColor = "#2ecc71"; // Green color
            icon = '<i class="fa-solid fa-crown" style="font-size: 50px; color: #f1c40f; margin-bottom: 20px;"></i>';
            
            // Optional: Alert for success
            alert("Congratulations! All answers are correct!");
        } else if (score >= currentQuestions.length / 2) {
            statusMessage = "Good Job! Keep it up! 👍";
            statusColor = "#5651d7";
            icon = '<i class="fa-solid fa-thumbs-up" style="font-size: 50px; color: #5651d7; margin-bottom: 20px;"></i>';
        } else {
            statusMessage = "Better luck next time! 📚";
            statusColor = "#ff4757"; // Red color
            icon = '<i class="fa-solid fa-book-open" style="font-size: 50px; color: #ff4757; margin-bottom: 20px;"></i>';
        }

        document.getElementById("quizScreen").innerHTML = `
            <div style="text-align:center; animation: fadeIn 0.5s ease;">
                ${icon}
                <h2 style="color: ${statusColor};">${statusMessage}</h2>
                <h1 style="color:#333; font-size: 60px; margin: 10px 0;">${score} / ${currentQuestions.length}</h1>
                <p style="color: #666; margin-bottom: 20px;">Check your knowledge again to improve your skills.</p>
                <button class="next-btn" style="padding:15px 40px; border-radius:8px; width: auto; cursor:pointer;" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right"></i> Restart Quiz
                </button>
            </div>
        `;
    }
</script>
