<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge | Career Roadmaps</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #05070a;
            --primary: #6a38c2;
            --accent: #00f2ff;
            --text-sub: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

       body {
    margin: 0;

    background: linear-gradient(rgba(5, 7, 10, 0.93), rgba(5, 7, 10, 0.93)),
                url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: white;
    font-family: 'Poppins', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

        /* Sidebar - Course List */
         .sidebar {
            width: 320px;
            background: rgba(10, 12, 17, 0.7); 
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .course-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }

        .course-item {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            color: var(--text-sub);
            border: 1px solid transparent;
        }

        .course-item:hover {
            background: rgba(106, 56, 194, 0.1);
            color: white;
        }

        .course-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(106, 56, 194, 0.3);
        }

        /* Main Content - Roadmap View */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .roadmap-header {
            margin-bottom: 40px;
        }

        .roadmap-header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .roadmap-header h1 span { color: var(--primary); }

        /* Timeline Design */
        .timeline {
            position: relative;
            max-width: 800px;
            padding-left: 30px;
            border-left: 2px solid rgba(106, 56, 194, 0.2);
        }

        .step {
            position: relative;
            margin-bottom: 50px;
        }

        .step::before {
            content: '';
            position: absolute;
            left: -41px;
            top: 5px;
            width: 20px;
            height: 20px;
            background: var(--bg);
            border: 3px solid var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .step-box {
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .step-box h3 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        .step-box p {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .tags {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 242, 255, 0.05);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        /* Mobile View */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

        const listContainer = document.getElementById('course-list');
        const display = document.getElementById('roadmap-display');

        // Initial Load
        function loadRoadmap(course) {
            let stepsHTML = roadmapData[course].map((step, index) => `
                <div class="step">
                    <div class="step-box">
                        <h3>0${index + 1}. ${step.title}</h3>
                        <p>${step.desc}</p>
                        <div class="tags">${step.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    </div>
                </div>
            `).join('');

            display.innerHTML = `
                <div class="roadmap-header">
                    <h1>${course.split(' ')[0]} <span>Roadmap</span></h1>
                </div>
                <div class="timeline">${stepsHTML}</div>
            `;
        }

        // Generate Sidebar
        Object.keys(roadmapData).forEach((course, index) => {
            const item = document.createElement('div');
            item.className = `course-item ${index === 0 ? 'active' : ''}`;
            item.innerText = course;
            item.onclick = () => {
                document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                loadRoadmap(course);
            };
            listContainer.appendChild(item);
        });

        // Default Load
        loadRoadmap(Object.keys(roadmapData)[0]);
    </script>
