<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge AI | Advanced Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #6a38c2;
            --secondary: #06b6d4;
            --dark: #111827;
            --bg-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* chatbot.html file-la irukura body-ai ippadi maathunga */
body {
    background: white; /* Gradient-ai thookidunga */
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    display: flex;
flex-direction: column;
height: 100vh; /* Full height edukka */
    width: 100% !important; /* Window full-ah fit aagum */
    height: 100% !important;
    max-width: 100% !important;
    border-radius: 0; /* Wrapper-la border radius irukkum */
}

        .header {
            flex-shrink: 0; 
            background: var(--dark);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .header-status { font-size: 10px; color: #10b981; display: block; }

        .chat-box {
           flex: 1; 
overflow-y: auto; 
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-light);
            scroll-behavior: smooth;
        }

        .message {
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 18px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: msgSlide 0.3s ease;
        }

        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: white; color: var(--dark); border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background: var(--primary); color: white; margin-left: auto; border-bottom-right-radius: 4px; }

        .options-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .opt-btn {
            background: white;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .opt-btn:hover { background: var(--primary); color: white; }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }
            
        input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 8px rgba(106, 56, 194, 0.2);
}
.user {
    background: linear-gradient(135deg, var(--primary), #4f46e5);
}
.chat-container {
    width: 100%; /* Change this */
    max-width: 420px; /* Add this */
    height: 90vh; /* Adjust height for mobile */
}

        .action-btn {
            background: none;
            border: none;
            font-size: 20px;
            margin-left: 10px;
            cursor: pointer;
            color: #64748b;
            transition: 0.3s;
        }

        .send-btn { color: var(--secondary); }
        .mic-btn:hover { color: #ef4444; }

        .typing { font-size: 12px; color: #64748b; margin-bottom: 10px; }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }


        /* Mobile View-ku mattum intha change aagum */
@media (max-width: 480px) {
    .chat-container {
        width: 100% !important;
        height: 100vh !important; /* Full screen height */
        max-width: 100% !important;
        border-radius: 0 !important; /* Corner gaps-ai remove panna */
        position: fixed;
        top: 0;
        left: 0;
    }

    .header {
        padding: 15px !important; /* Mobile-la space koraikka */
    }

    .chat-box {
        padding: 15px !important;
    }

    .input-area {
        padding: 10px !important;
        padding-bottom: 20px !important; /* Phone bottom navigation-kaaga */
    }

    input {
        font-size: 16px !important; /* Mobile keyboard open aagum pothu zoom aagatha maari irukka */
    }
}
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-title">
            <i class="ri-robot-2-fill" style="font-size: 24px; color: var(--secondary);"></i>
            <div>
                <span>SkillBridge AI</span>
                <span class="header-status"><i class="ri-checkbox-blank-circle-fill"></i> Always Online</span>
            </div>
        </div>
        <button onclick="clearChat()" style="background:none; border:none; color:#94a3b8; cursor:pointer;"><i class="ri-refresh-line"></i></button>
    </div>

    <div class="chat-box" id="chatBox">
        </div>

    <div class="input-area">
        <button class="action-btn mic-btn" onclick="startVoice()"><i class="ri-mic-2-line"></i></button>
        <input id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="action-btn send-btn" onclick="sendMessage()"><i class="ri-send-plane-2-fill"></i></button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    // 1. Initial Greeting based on Time
    window.onload = () => {
        const hours = new Date().getHours();
        let greeting = "Good Evening";
        if (hours < 12) greeting = "Good Morning";
        else if (hours < 17) greeting = "Good Afternoon";

        const welcomeMsg = `<b>${greeting}, Yuvasri!</b> 👋<br><br>Welcome back to SkillBridge. Ready to explore new <b>Zoho tracks</b> or find an <b>Internship</b> today?`;
        botReply(welcomeMsg, ["Explore Internships", "Zoho Career", "Our Courses"]);
    };

    function addMessage(text, type = "bot") {
        const msg = document.createElement("div");
        msg.className = `message ${type}`;
        msg.innerHTML = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === "") return;
        addMessage(text, "user");
        handleInput(text);
        userInput.value = "";
    }

    function handleInput(text) {
        const query = text.toLowerCase();
        
        // Show Typing...
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.innerHTML = "AI is thinking...";
        chatBox.appendChild(typing);

        setTimeout(() => {
            typing.remove();

            if (query.includes("zoho")) {
                botReply("<b>Zoho Specialization:</b> 🚀<br>Since you're interested in Zoho, we have a curated path for <b>Deluge Scripting</b> and <b>Zoho Creator</b> development.", ["View Roadmap", "Success Stories"]);
            } 
            else if (query.includes("internship")) {
                botReply("<b>Available Domains:</b> 💻<br>We currently have openings in:<br>• React Development<br>• UI/UX Design<br>• Backend (Node.js/MongoDB)", ["Apply for React", "Other Domains"]);
            }
            else if (query.includes("course")) {
                botReply("<b>Master Your Skills:</b> 📚<br>Our 2026 batches are open for Full Stack MERN and Data Analytics.", ["Syllabus", "Pricing"]);
            }
            else if (query.includes("apply")) {
                botReply("Redirecting you to the Application Portal... ✈️");
                setTimeout(() => window.location.href = "apply.html", 1500);
            }
            else {
                botReply("That sounds interesting! Would you like to know about our placement records or internship certificates?", ["Placement Stats", "Certificates"]);
            }
        }, 1000);
    }

    function botReply(text, options = []) {
        addMessage(text, "bot");
        if (options.length > 0) {
            const div = document.createElement("div");
            div.className = "options-container";
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    addMessage(opt, "user");
                    handleInput(opt);
                };
                div.appendChild(btn);
            });
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // 2. Speech to Text (Voice Search)
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        
        const micIcon = document.querySelector(".mic-btn i");
        micIcon.className = "ri-mic-fill"; // Change icon when listening
        micIcon.style.color = "red";

        recognition.start();

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            micIcon.className = "ri-mic-2-line";
            micIcon.style.color = "#64748b";
            sendMessage();
        };

        recognition.onerror = () => {
            micIcon.className = "ri-mic-2-line";
            micIcon.style.color = "#64748b";
        };
    }

    function clearChat() {
        chatBox.innerHTML = "";
        botReply("Chat reset. How can I assist you now?", ["Main Menu", "Apply"]);
    }
</script>

</body>
</html>
